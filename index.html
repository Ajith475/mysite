<!DOCTYPE html>
<html>
<head>
    <title>Ajith Cloud App</title>
</head>
<body>

<h1>Frontend + Backend Connected </h1>

<button onclick="getData()">Call Backend</button>

<p id="result"></p>

<script>
function getData() {
    fetch("https://backend-vrqr.onrender.com")
    .then(response => response.text())
    .then(data => {
        document.getElementById("result").innerText = data;
    })
    .catch(err => {
        console.log(err);
    });
}
</script>

</body>
</html>
